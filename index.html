<!DOCTYPE html>
<html>
<head>
  <title>Blockchain Certificate Verifier</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔐 Blockchain Certificate Verifier 🔐</h1>
<p>Securely store and verify certificates using blockchain</p>

<hr>

<h2>Add Certificate</h2>

<div class="box">
  <input id="id" placeholder="Certificate ID"><br>
  <input id="name" placeholder="Student Name"><br>
  <input id="course" placeholder="Course"><br>

  <button onclick="addCert()">Add Certificate</button>
</div>

<h3>QR Code</h3>
<canvas id="qrcode"></canvas>

<hr>

<h2>Verify Certificate</h2>

<div class="box">
  <input id="verifyId" placeholder="Enter Certificate ID"><br>

  <button onclick="verifyCert()">Verify</button>
  <button onclick="scanQR()">Use QR ID</button>

  <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script src="app.js"></script>

</body>
</html>
